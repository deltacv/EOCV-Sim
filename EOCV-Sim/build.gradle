import io.github.fvarrui.javapackager.gradle.PackageTask

import java.time.LocalDateTime
import java.time.format.DateTimeFormatter

plugins {
    id 'org.jetbrains.kotlin.jvm'
    id 'com.gradleup.shadow'
    id 'org.photonvision.tools.WpilibTools'
    id 'signing'
    id "com.vanniktech.maven.publish" version "0.30.0"
    id 'io.github.fvarrui.javapackager.plugin'
}

apply from: '../build.common.gradle'

ext.kotest_version = '5.7.2'

def generatedSourcesDir = layout.buildDirectory.dir("generated/sources/buildinfo/java/main")

sourceSets {
    main {
        java {
            srcDirs += generatedSourcesDir
        }
    }
}

shadowJar {
    mergeServiceFiles()
}

test {
    useJUnitPlatform()
}

apply from: '../test-logging.gradle'

tasks.register('pack', PackageTask) {
    dependsOn build
    mainClass = 'com.github.serivesmejia.eocvsim.Main'
    bundleJre = true
    customizedJre = false
    generateInstaller = true
    platform = "auto"

    winConfig {
        icoFile = file('src/main/resources/images/icon/ico_eocvsim.ico')
        generateMsi = false
        disableDirPage = false
        disableProgramGroupPage = false
        disableFinishedPage = false
    }

    linuxConfig {
        pngFile = file('src/main/resources/images/icon/ico_eocvsim.png')
    }
}

tasks.processResources {
    from({
        project(":PaperVisionShadow").tasks.shadowJar
    }) {
        rename { "PaperVisionPlugin.jar" }
        into("embedded_plugins")
    }
}


wpilibTools.deps.wpilibVersion = wpilibVersion

def nativeConfigName = 'wpilibNatives'
def nativeConfig = configurations.create(nativeConfigName)

def nativeTasks = wpilibTools.createExtractionTasks {
    configurationName = nativeConfigName
}

nativeTasks.addToSourceSetResources(sourceSets.main)

nativeConfig.dependencies.add wpilibTools.deps.wpilib("wpiutil")
nativeConfig.dependencies.add wpilibTools.deps.wpilib("cscore")
nativeConfig.dependencies.add wpilibTools.deps.wpilibOpenCv(opencvVersion)

dependencies {
    api project(':Common')
    api project(':Vision')

    implementation 'org.jetbrains.kotlin:kotlin-stdlib'

    implementation(platform("io.insert-koin:koin-bom:$koin_version"))
    implementation("io.insert-koin:koin-core")

    implementation "org.eclipse.jdt:ecj:3.21.0"

    // WPILib OpenCV replaces openpnp
    api wpilibTools.deps.wpilibOpenCvJava(opencvVersion)
    wpilibNatives wpilibTools.deps.wpilibOpenCv(opencvVersion)

    // use cscore for webcams
    implementation wpilibTools.deps.wpilibJava("cscore")
    wpilibNatives wpilibTools.deps.wpilib("cscore")
    // cscore depends on these
    implementation wpilibTools.deps.wpilibJava("wpinet")
    wpilibNatives wpilibTools.deps.wpilib("wpinet")
    implementation wpilibTools.deps.wpilibJava("wpiutil")
    wpilibNatives wpilibTools.deps.wpilib("wpiutil")

    implementation "org.slf4j:slf4j-api:$slf4j_version"
    implementation "org.apache.logging.log4j:log4j-api:$log4j_version"
    implementation "org.apache.logging.log4j:log4j-core:2.25.0"
    implementation "org.apache.logging.log4j:log4j-slf4j2-impl:$log4j_version"

    implementation "info.picocli:picocli:$picocli_version"
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    implementation 'com.fasterxml.jackson.module:jackson-module-kotlin:2.15.2'
    implementation "io.github.classgraph:classgraph:$classgraph_version"

    implementation "com.formdev:flatlaf:$flatlaf_version"
    implementation "com.formdev:flatlaf-intellij-themes:$flatlaf_version"
    implementation "com.miglayout:miglayout-swing:$miglayout_version"

    implementation("org.java-websocket:Java-WebSocket:1.5.2")

    implementation 'net.lingala.zip4j:zip4j:2.11.3'

    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$kotlinx_coroutines_version"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-swing:$kotlinx_coroutines_version"

    testImplementation "io.kotest:kotest-runner-junit5:$kotest_version"
    testImplementation "io.kotest:kotest-assertions-core:$kotest_version"

    implementation "com.moandjiezana.toml:toml4j:$toml4j_version"
    implementation 'org.ow2.asm:asm:9.7'

    implementation 'org.jboss.shrinkwrap.resolver:shrinkwrap-resolver-depchain:3.3.3'
    implementation 'org.jboss.shrinkwrap.resolver:shrinkwrap-resolver-impl-maven-archive:3.3.2'

    implementation('org.deltacv.visionloop:streaming:1.2.9') { transitive = false }
}

tasks.register('writeBuildClassJava') {
    outputs.dir(generatedSourcesDir)

    doLast {
        String date = DateTimeFormatter.ofPattern("yyyy-M-d hh:mm:ss").format(LocalDateTime.now())

        def packageStr = "com.github.serivesmejia.eocvsim"
        def packagePath = packageStr.replace('.', '/')

        def outputDir = file("${generatedSourcesDir.get().asFile}/$packagePath")
        outputDir.mkdirs()

        def versionFile = file("${outputDir}/Build.java")

        versionFile.text = """package $packageStr;

/*
 * Autogenerated file! Do not manually edit this file, as
 * it is regenerated any time the build task is run.
 *
 * Based from PhotonVision PhotonVersion generator task
 */
@SuppressWarnings("ALL")
public final class Build {
    public static final String versionString = "$version";
    public static final String standardVersionString = "$standardVersion";
    public static final String buildDate = "$date";
    public static final boolean isDev = ${version.contains("dev")};

    public static final String opencvVersion = "$opencvVersion";
    public static final String apriltagPluginVersion = "$apriltag_plugin_version";
    public static final String paperVisionVersion = "$papervision_version";
}
"""
    }
}

tasks.matching { it.name in ["compileJava", "compileKotlin", "sourcesJar"] }
        .configureEach {
            dependsOn writeBuildClassJava
        }