name: Build, Test & Release

on:
  push:
    branches: [ master, dev ]
    tags: 'v*'
  pull_request:


jobs:
  test_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '25'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and test with Gradle
      run: ./gradlew -Penv=ci clean build shadowJar
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eocvsim-ubuntu-latest
        path: |
          **/build/libs/*.jar
          **/build/reports

  test_windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '25'
    - name: Build and test with Gradle (Windows)
      shell: pwsh
      run: .\gradlew.bat -Penv=ci clean build shadowJar
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eocvsim-windows-latest
        path: |
          **/build/libs/*.jar
          **/build/reports

  test_mac:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '25'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and test with Gradle
      run: ./gradlew -Penv=ci clean build shadowJar
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eocvsim-macos-latest
        path: |
          **/build/libs/*.jar
          **/build/reports

  release:
    needs: [test_linux, test_windows, test_mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v2

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: eocvsim-ubuntu-latest
          path: artifacts/ubuntu

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: eocvsim-macos-latest
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: eocvsim-windows-latest
          path: artifacts/windows

      - name: List downloaded artifacts
        run: |
          ls -la artifacts || true
          ls -la artifacts/ubuntu || true
          ls -la artifacts/macos || true
          ls -la artifacts/windows || true

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
